name: Train MLflow Project

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MLflow
        run: pip install -r MLProject/requirements.txt

      - name: Run MLflow Project
        run: mlflow run MLProject --env-manager=local

      - name: Upload MLflow artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns

      - name: Commit MLflow artifacts to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add retrained MLflow artifacts"
          file_pattern: "mlruns/**/*"

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build Docker image with MLflow
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: mlflow models build-docker --model-uri "runs:/$(cat MLProject/latest_run_id.txt)/model" --name "${DOCKERHUB_USERNAME}/smsml-breast-cancer:latest"

      - name: Push Docker image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: docker push "${DOCKERHUB_USERNAME}/smsml-breast-cancer:latest"
